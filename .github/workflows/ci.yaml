name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven
        run: ./mvnw clean test

  auto-approve:
    name: Auto Approve Bot PRs
    needs: [test]
    if: |
      !cancelled() &&
      needs.test.result == 'success' &&
      (github.actor == 'dependabot[bot]' || github.actor == 'renovate[bot]') &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        run: gh pr review --approve "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ github.token }}

  auto-merge:
    name: Auto Merge Bot PRs
    needs: [auto-approve]
    if: |
      !cancelled() &&
      needs.auto-approve.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        run: gh pr merge --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ github.token }}